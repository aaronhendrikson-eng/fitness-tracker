<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a18;
    --paper: #f5f2eb;
    --rule: #d4cfc4;
    --accent: #c0392b;
    --accent2: #2c7a4b;
    --muted: #8a8578;
    --check-bg: #1a1a18;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .page {
    max-width: 480px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    border-bottom: 3px solid var(--ink);
    padding-bottom: 1rem;
    margin-bottom: 2rem;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .subtitle {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-top: 0.4rem;
  }

  /* Week nav */
  .week-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    padding: 0.75rem 0;
    border-bottom: 1px solid var(--rule);
  }

  .week-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 500;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--ink);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    padding: 0.3rem 0.7rem;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: all 0.15s;
  }

  .nav-btn:hover { background: var(--ink); color: var(--paper); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn:disabled:hover { background: none; color: var(--ink); }

  /* Weight row */
  .weight-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.75rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--rule);
  }

  .weight-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    flex-shrink: 0;
  }

  .weight-input {
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    border: none;
    border-bottom: 1.5px solid var(--rule);
    background: transparent;
    color: var(--ink);
    width: 80px;
    padding: 0.1rem 0.2rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .weight-input:focus { border-color: var(--ink); }

  .weight-unit {
    font-size: 0.7rem;
    color: var(--muted);
  }

  /* Section headers */
  .section-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 0.75rem;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid var(--rule);
  }

  /* Daily grid */
  .daily-section { margin-bottom: 2rem; }

  .day-headers {
    display: grid;
    grid-template-columns: 1fr repeat(7, 32px);
    gap: 4px;
    margin-bottom: 0.4rem;
    padding-left: 0;
  }

  .day-header {
    font-size: 0.6rem;
    text-align: center;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .day-header.today {
    color: var(--accent);
    font-weight: 500;
  }

  .habit-row {
    display: grid;
    grid-template-columns: 1fr repeat(7, 32px);
    gap: 4px;
    align-items: center;
    margin-bottom: 0.5rem;
  }

  .habit-name {
    font-size: 0.72rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .habit-icon { font-size: 0.9rem; flex-shrink: 0; }

  .check-box {
    width: 32px;
    height: 32px;
    border: 1.5px solid var(--rule);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    position: relative;
  }

  .check-box:hover { border-color: var(--ink); }

  .check-box.checked {
    background: var(--check-bg);
    border-color: var(--check-bg);
  }

  .check-box.checked::after {
    content: '✓';
    color: var(--paper);
    font-size: 0.75rem;
    font-weight: 500;
  }

  .check-box.future {
    opacity: 0.3;
    cursor: default;
  }

  /* Weekly targets */
  .weekly-section { margin-bottom: 2rem; }

  .weekly-habit {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--rule);
  }

  .weekly-habit:last-child { border-bottom: none; }

  .weekly-left {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .weekly-name {
    font-size: 0.72rem;
  }

  .weekly-target {
    font-size: 0.6rem;
    color: var(--muted);
  }

  .tally-boxes {
    display: flex;
    gap: 4px;
  }

  .tally-box {
    width: 28px;
    height: 28px;
    border: 1.5px solid var(--rule);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    font-size: 0.65rem;
    color: var(--muted);
  }

  .tally-box:hover { border-color: var(--ink); }

  .tally-box.filled {
    background: var(--check-bg);
    border-color: var(--check-bg);
    color: var(--paper);
  }

  .tally-box.filled::after {
    content: '✓';
  }

  /* Notes */
  .notes-section { margin-bottom: 2rem; }

  .notes-input {
    width: 100%;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink);
    padding: 0.6rem 0.75rem;
    resize: vertical;
    min-height: 72px;
    outline: none;
    line-height: 1.6;
    transition: border-color 0.2s;
  }

  .notes-input:focus { border-color: var(--ink); }
  .notes-input::placeholder { color: var(--rule); }

  /* Progress bar */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--rule);
  }

  .progress-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    flex-shrink: 0;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--rule);
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent2);
    transition: width 0.3s ease;
  }

  .progress-pct {
    font-size: 0.65rem;
    color: var(--muted);
    flex-shrink: 0;
    width: 2.5rem;
    text-align: right;
  }

  /* Diet 3-state cells */
  .diet-row {
    align-items: center;
  }

  .diet-cell {
    width: 32px;
    height: 32px;
    border: 1.5px solid var(--rule);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    font-size: 0.55rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .diet-cell:hover { border-color: var(--ink); }

  .diet-cell.future {
    opacity: 0.3;
    cursor: default;
  }

  .diet-cell.diet-good {
    background: #2c7a4b;
    border-color: #2c7a4b;
    color: var(--paper);
  }

  .diet-cell.diet-meh {
    background: #b07d2a;
    border-color: #b07d2a;
    color: var(--paper);
  }

  .diet-cell.diet-bad {
    background: #c0392b;
    border-color: #c0392b;
    color: var(--paper);
  }

  /* Alcohol 3-state cells */
  .alc-cell {
    width: 32px;
    height: 32px;
    border: 1.5px solid var(--rule);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    font-size: 0.55rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .alc-cell:hover { border-color: var(--ink); }

  .alc-cell.future {
    opacity: 0.3;
    cursor: default;
  }

  .alc-cell.alc-none {
    background: #2c7a4b;
    border-color: #2c7a4b;
    color: var(--paper);
  }

  .alc-cell.alc-one {
    background: #b07d2a;
    border-color: #b07d2a;
    color: var(--paper);
  }

  .alc-cell.alc-boozer {
    background: #c0392b;
    border-color: #c0392b;
    color: var(--paper);
  }

  /* Hip PT 3-state cells */
  .hip-cell {
    width: 32px;
    height: 32px;
    border: 1.5px solid var(--rule);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    font-size: 0.5rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .hip-cell:hover { border-color: var(--ink); }

  .hip-cell.future {
    opacity: 0.3;
    cursor: default;
  }

  .hip-cell.hip-5m {
    background: #b07d2a;
    border-color: #b07d2a;
    color: var(--paper);
  }

  .hip-cell.hip-10m {
    background: #1a6fa8;
    border-color: #1a6fa8;
    color: var(--paper);
  }

  .hip-cell.hip-15m {
    background: #2c7a4b;
    border-color: #2c7a4b;
    color: var(--paper);
  }

  /* Current week indicator */
  .current-badge {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-left: 0.5rem;
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="title">Fitness Log</div>
    <div class="subtitle">Strength · Endurance · Function</div>
  </div>

  <div class="week-nav">
    <button class="nav-btn" id="prevBtn" onclick="changeWeek(-1)">← prev</button>
    <div>
      <span class="week-label" id="weekLabel"></span>
      <span class="current-badge" id="currentBadge"></span>
    </div>
    <button class="nav-btn" id="nextBtn" onclick="changeWeek(1)">next →</button>
  </div>

  <div class="weight-row">
    <span class="weight-label">Weight</span>
    <input class="weight-input" type="number" id="weightInput" placeholder="—" step="0.1" oninput="saveWeight()">
    <span class="weight-unit">lbs</span>
  </div>

  <!-- Daily -->
  <div class="daily-section">
    <div class="section-label">Daily Habits</div>
    <div class="day-headers">
      <div></div>
      <div class="day-header" data-col="0">S</div>
      <div class="day-header" data-col="1">M</div>
      <div class="day-header" data-col="2">T</div>
      <div class="day-header" data-col="3">W</div>
      <div class="day-header" data-col="4">T</div>
      <div class="day-header" data-col="5">F</div>
      <div class="day-header" data-col="6">S</div>
    </div>

    <div class="habit-row" data-habit="move">
      <div class="habit-name"><span class="habit-icon" style="color:#c0392b;">●</span> Move</div>
      <div class="check-box" data-day="0" onclick="toggleDaily('move',0)"></div>
      <div class="check-box" data-day="1" onclick="toggleDaily('move',1)"></div>
      <div class="check-box" data-day="2" onclick="toggleDaily('move',2)"></div>
      <div class="check-box" data-day="3" onclick="toggleDaily('move',3)"></div>
      <div class="check-box" data-day="4" onclick="toggleDaily('move',4)"></div>
      <div class="check-box" data-day="5" onclick="toggleDaily('move',5)"></div>
      <div class="check-box" data-day="6" onclick="toggleDaily('move',6)"></div>
    </div>

    <div class="habit-row" data-habit="exercise">
      <div class="habit-name"><span class="habit-icon" style="color:#2c7a4b;">●</span> Exercise</div>
      <div class="check-box" data-day="0" onclick="toggleDaily('exercise',0)"></div>
      <div class="check-box" data-day="1" onclick="toggleDaily('exercise',1)"></div>
      <div class="check-box" data-day="2" onclick="toggleDaily('exercise',2)"></div>
      <div class="check-box" data-day="3" onclick="toggleDaily('exercise',3)"></div>
      <div class="check-box" data-day="4" onclick="toggleDaily('exercise',4)"></div>
      <div class="check-box" data-day="5" onclick="toggleDaily('exercise',5)"></div>
      <div class="check-box" data-day="6" onclick="toggleDaily('exercise',6)"></div>
    </div>

    <div class="habit-row" data-habit="stand">
      <div class="habit-name"><span class="habit-icon" style="color:#1a6fa8;">●</span> Stand</div>
      <div class="check-box" data-day="0" onclick="toggleDaily('stand',0)"></div>
      <div class="check-box" data-day="1" onclick="toggleDaily('stand',1)"></div>
      <div class="check-box" data-day="2" onclick="toggleDaily('stand',2)"></div>
      <div class="check-box" data-day="3" onclick="toggleDaily('stand',3)"></div>
      <div class="check-box" data-day="4" onclick="toggleDaily('stand',4)"></div>
      <div class="check-box" data-day="5" onclick="toggleDaily('stand',5)"></div>
      <div class="check-box" data-day="6" onclick="toggleDaily('stand',6)"></div>
    </div>

    <div class="habit-row" data-habit="steps">
      <div class="habit-name"><span class="habit-icon">↑</span> 10k steps</div>
      <div class="check-box" data-day="0" onclick="toggleDaily('steps',0)"></div>
      <div class="check-box" data-day="1" onclick="toggleDaily('steps',1)"></div>
      <div class="check-box" data-day="2" onclick="toggleDaily('steps',2)"></div>
      <div class="check-box" data-day="3" onclick="toggleDaily('steps',3)"></div>
      <div class="check-box" data-day="4" onclick="toggleDaily('steps',4)"></div>
      <div class="check-box" data-day="5" onclick="toggleDaily('steps',5)"></div>
      <div class="check-box" data-day="6" onclick="toggleDaily('steps',6)"></div>
    </div>

    <div class="habit-row diet-row" data-habit="diet">
      <div class="habit-name"><span class="habit-icon">◆</span> Lean diet</div>
      <div class="diet-cell" data-day="0" onclick="cycleDiet(0)"><span class="diet-label" id="diet-0"></span></div>
      <div class="diet-cell" data-day="1" onclick="cycleDiet(1)"><span class="diet-label" id="diet-1"></span></div>
      <div class="diet-cell" data-day="2" onclick="cycleDiet(2)"><span class="diet-label" id="diet-2"></span></div>
      <div class="diet-cell" data-day="3" onclick="cycleDiet(3)"><span class="diet-label" id="diet-3"></span></div>
      <div class="diet-cell" data-day="4" onclick="cycleDiet(4)"><span class="diet-label" id="diet-4"></span></div>
      <div class="diet-cell" data-day="5" onclick="cycleDiet(5)"><span class="diet-label" id="diet-5"></span></div>
      <div class="diet-cell" data-day="6" onclick="cycleDiet(6)"><span class="diet-label" id="diet-6"></span></div>
    </div>

    <div class="habit-row diet-row" data-habit="alcohol">
      <div class="habit-name"><span class="habit-icon">🍺</span> Alcohol</div>
      <div class="alc-cell" data-day="0" onclick="cycleAlc(0)"><span class="alc-label" id="alc-0"></span></div>
      <div class="alc-cell" data-day="1" onclick="cycleAlc(1)"><span class="alc-label" id="alc-1"></span></div>
      <div class="alc-cell" data-day="2" onclick="cycleAlc(2)"><span class="alc-label" id="alc-2"></span></div>
      <div class="alc-cell" data-day="3" onclick="cycleAlc(3)"><span class="alc-label" id="alc-3"></span></div>
      <div class="alc-cell" data-day="4" onclick="cycleAlc(4)"><span class="alc-label" id="alc-4"></span></div>
      <div class="alc-cell" data-day="5" onclick="cycleAlc(5)"><span class="alc-label" id="alc-5"></span></div>
      <div class="alc-cell" data-day="6" onclick="cycleAlc(6)"><span class="alc-label" id="alc-6"></span></div>
    </div>

    <div class="habit-row" data-habit="squat">
      <div class="habit-name"><span class="habit-icon">🦵</span> 60s squats</div>
      <div class="check-box" data-day="0" onclick="toggleDaily('squat',0)"></div>
      <div class="check-box" data-day="1" onclick="toggleDaily('squat',1)"></div>
      <div class="check-box" data-day="2" onclick="toggleDaily('squat',2)"></div>
      <div class="check-box" data-day="3" onclick="toggleDaily('squat',3)"></div>
      <div class="check-box" data-day="4" onclick="toggleDaily('squat',4)"></div>
      <div class="check-box" data-day="5" onclick="toggleDaily('squat',5)"></div>
      <div class="check-box" data-day="6" onclick="toggleDaily('squat',6)"></div>
    </div>

    <div class="habit-row diet-row" data-habit="hip">
      <div class="habit-name"><span class="habit-icon">🩺</span> Hip PT</div>
      <div class="hip-cell" data-day="0" onclick="cycleHip(0)"><span class="hip-label" id="hip-0"></span></div>
      <div class="hip-cell" data-day="1" onclick="cycleHip(1)"><span class="hip-label" id="hip-1"></span></div>
      <div class="hip-cell" data-day="2" onclick="cycleHip(2)"><span class="hip-label" id="hip-2"></span></div>
      <div class="hip-cell" data-day="3" onclick="cycleHip(3)"><span class="hip-label" id="hip-3"></span></div>
      <div class="hip-cell" data-day="4" onclick="cycleHip(4)"><span class="hip-label" id="hip-4"></span></div>
      <div class="hip-cell" data-day="5" onclick="cycleHip(5)"><span class="hip-label" id="hip-5"></span></div>
      <div class="hip-cell" data-day="6" onclick="cycleHip(6)"><span class="hip-label" id="hip-6"></span></div>
    </div>
    <div style="margin-top:0.5rem; padding-bottom:0.25rem;">
      <a href="https://www.nytimes.com/2025/01/17/well/move/short-mobility-workout.html" target="_blank"
        style="font-size:0.6rem; color:var(--muted); text-decoration:none; text-transform:uppercase; letter-spacing:0.08em; border-bottom:1px solid var(--rule);">
        ↗ nyt mobility workout
      </a>
    </div>
  </div>

  <!-- Weekly -->
  <div class="weekly-section">
    <div class="section-label">Weekly Targets</div>

    <div class="weekly-habit">
      <div class="weekly-left">
        <span class="habit-icon">🏋</span>
        <div>
          <div class="weekly-name">Lift</div>
          <div class="weekly-target">goal: 2×</div>
        </div>
      </div>
      <div class="tally-boxes">
        <div class="tally-box" id="lift-0" onclick="toggleWeekly('lift',0)"></div>
        <div class="tally-box" id="lift-1" onclick="toggleWeekly('lift',1)"></div>
      </div>
    </div>

    <div class="weekly-habit">
      <div class="weekly-left">
        <span class="habit-icon">🚴</span>
        <div>
          <div class="weekly-name">Zone 2 cardio</div>
          <div class="weekly-target">goal: 1–2×, 30+ min</div>
        </div>
      </div>
      <div class="tally-boxes">
        <div class="tally-box" id="zone2-0" onclick="toggleWeekly('zone2',0)"></div>
        <div class="tally-box" id="zone2-1" onclick="toggleWeekly('zone2',1)"></div>
      </div>
    </div>

    <div class="weekly-habit">
      <div class="weekly-left">
        <span class="habit-icon">⚡</span>
        <div>
          <div class="weekly-name">HIIT</div>
          <div class="weekly-target">goal: 1×</div>
        </div>
      </div>
      <div class="tally-boxes">
        <div class="tally-box" id="hiit-0" onclick="toggleWeekly('hiit',0)"></div>
      </div>
    </div>
  </div>

  <!-- Notes -->
  <div class="notes-section">
    <div class="section-label">Notes</div>
    <textarea class="notes-input" id="notesInput" placeholder="session notes, how you felt, PRs..." oninput="saveNotes()"></textarea>
  </div>

  <!-- Progress -->
  <div class="progress-row">
    <span class="progress-label">Week</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-pct" id="progressPct">0%</span>
  </div>

</div>

<script>
  const DAILY_HABITS = ['move', 'exercise', 'stand', 'steps', 'squat'];
  const DIET_STATES = [null, 'good', 'meh', 'bad'];
  const ALC_STATES  = [null, 'none', 'one', 'boozer'];
  const ALC_LABELS  = { none: 'none', one: '1 🍺', boozer: '🍺🍺' };
  const HIP_STATES  = [null, '5m', '10m', '15m'];
  const HIP_LABELS  = { '5m': '5min', '10m': '10min', '15m': '15min' };
  const WEEKLY_HABITS = {
    lift: 2,
    zone2: 2,
    hiit: 1
  };

  let currentWeekOffset = 0;

  function getSunday(offset = 0) {
    const now = new Date();
    const day = now.getDay(); // 0=Sun
    const diff = -day; // go back to Sunday
    const sunday = new Date(now);
    sunday.setDate(now.getDate() + diff + offset * 7);
    sunday.setHours(0,0,0,0);
    return sunday;
  }

  function weekKey(offset) {
    const m = getSunday(offset);
    return `ft_week_${m.toISOString().slice(0,10)}`;
  }

  function loadWeek() {
    const key = weekKey(currentWeekOffset);
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : { daily: {}, weekly: {}, weight: '', notes: '' };
  }

  function saveWeek(data) {
    localStorage.setItem(weekKey(currentWeekOffset), JSON.stringify(data));
  }

  function getTodayDayIndex() {
    // Sun=0 ... Sat=6
    const sunday = getSunday(currentWeekOffset);
    const today = new Date();
    today.setHours(0,0,0,0);
    const diff = Math.round((today - sunday) / 86400000);
    return (diff >= 0 && diff <= 6) ? diff : -1;
  }

  function isCurrentWeek() {
    return currentWeekOffset === 0;
  }

  function render() {
    const data = loadWeek();
    const sunday = getSunday(currentWeekOffset);
    const endSat = new Date(sunday); endSat.setDate(sunday.getDate() + 6);

    const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    document.getElementById('weekLabel').textContent = `${fmt(sunday)} – ${fmt(endSat)}`;
    document.getElementById('currentBadge').textContent = isCurrentWeek() ? 'this week' : '';

    document.getElementById('prevBtn').disabled = false;
    document.getElementById('nextBtn').disabled = currentWeekOffset >= 0;

    // Highlight today's column header
    const todayIdx = getTodayDayIndex();
    document.querySelectorAll('.day-header').forEach(el => {
      el.classList.toggle('today', parseInt(el.dataset.col) === todayIdx && isCurrentWeek());
    });

    // Weight
    document.getElementById('weightInput').value = data.weight || '';

    // Daily checkboxes
    DAILY_HABITS.forEach(habit => {
      const row = document.querySelector(`.habit-row[data-habit="${habit}"]`);
      if (!row) return;
      row.querySelectorAll('.check-box').forEach(box => {
        const day = parseInt(box.dataset.day);
        const checked = data.daily[habit]?.[day] || false;
        const isFuture = isCurrentWeek() && day > todayIdx;
        box.classList.toggle('checked', checked);
        box.classList.toggle('future', isFuture);
      });
    });

    // Diet cells
    for (let d = 0; d < 7; d++) {
      const cell = document.getElementById(`diet-${d}`);
      if (!cell) continue;
      const parent = cell.parentElement;
      const val = data.daily['diet']?.[d] || null;
      const isFuture = isCurrentWeek() && d > todayIdx;
      parent.className = 'diet-cell' + (val ? ` diet-${val}` : '') + (isFuture ? ' future' : '');
      cell.textContent = val || '';
    }

    // Alcohol cells
    for (let d = 0; d < 7; d++) {
      const cell = document.getElementById(`alc-${d}`);
      if (!cell) continue;
      const parent = cell.parentElement;
      const val = data.daily['alc']?.[d] || null;
      const isFuture = isCurrentWeek() && d > todayIdx;
      parent.className = 'alc-cell' + (val ? ` alc-${val}` : '') + (isFuture ? ' future' : '');
      cell.textContent = val ? ALC_LABELS[val] : '';
    }

    // Hip PT cells
    for (let d = 0; d < 7; d++) {
      const cell = document.getElementById(`hip-${d}`);
      if (!cell) continue;
      const parent = cell.parentElement;
      const val = data.daily['hip']?.[d] || null;
      const isFuture = isCurrentWeek() && d > todayIdx;
      parent.className = 'hip-cell' + (val ? ` hip-${val}` : '') + (isFuture ? ' future' : '');
      cell.textContent = val ? HIP_LABELS[val] : '';
    }

    // Weekly tally
    Object.keys(WEEKLY_HABITS).forEach(habit => {
      const count = WEEKLY_HABITS[habit];
      for (let i = 0; i < count; i++) {
        const el = document.getElementById(`${habit}-${i}`);
        if (!el) continue;
        const filled = (data.weekly[habit] || 0) > i;
        el.classList.toggle('filled', filled);
      }
    });

    // Notes
    document.getElementById('notesInput').value = data.notes || '';

    // Progress
    updateProgress(data, todayIdx);
  }

  function updateProgress(data, todayIdx) {
    // Count daily completions so far this week
    let possible = 0, done = 0;
    const daysElapsed = isCurrentWeek() ? (todayIdx >= 0 ? todayIdx + 1 : 7) : 7;

    DAILY_HABITS.forEach(habit => {
      for (let d = 0; d < daysElapsed; d++) {
        possible++;
        if (data.daily[habit]?.[d]) done++;
      }
    });

    // Diet: good=1, meh=0.5, bad=0, unset not counted in possible until today
    for (let d = 0; d < daysElapsed; d++) {
      possible++;
      const dietVal = data.daily['diet']?.[d] || null;
      if (dietVal === 'good') done += 1;
      else if (dietVal === 'meh') done += 0.5;
    }

    // Alcohol: none=1, one=0.5, boozer=0
    for (let d = 0; d < daysElapsed; d++) {
      possible++;
      const alcVal = data.daily['alc']?.[d] || null;
      if (alcVal === 'none') done += 1;
      else if (alcVal === 'one') done += 0.5;
    }

    // Hip PT: 5m=0.33, 10m=0.67, 15m=1
    for (let d = 0; d < daysElapsed; d++) {
      possible++;
      const hipVal = data.daily['hip']?.[d] || null;
      if (hipVal === '5m') done += 0.33;
      else if (hipVal === '10m') done += 0.67;
      else if (hipVal === '15m') done += 1;
    }

    // Weekly: count as done/possible
    possible += Object.values(WEEKLY_HABITS).reduce((a,b) => a+b, 0);
    Object.keys(WEEKLY_HABITS).forEach(habit => {
      done += Math.min(data.weekly[habit] || 0, WEEKLY_HABITS[habit]);
    });

    const pct = possible > 0 ? Math.round((done / possible) * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';
  }

  function toggleDaily(habit, day) {
    const todayIdx = getTodayDayIndex();
    if (isCurrentWeek() && day > todayIdx) return;
    const data = loadWeek();
    if (!data.daily[habit]) data.daily[habit] = {};
    data.daily[habit][day] = !data.daily[habit][day];
    saveWeek(data);
    render();
  }

  function cycleDiet(day) {
    const todayIdx = getTodayDayIndex();
    if (isCurrentWeek() && day > todayIdx) return;
    const data = loadWeek();
    if (!data.daily['diet']) data.daily['diet'] = {};
    const current = data.daily['diet'][day] || null;
    const idx = DIET_STATES.indexOf(current);
    data.daily['diet'][day] = DIET_STATES[(idx + 1) % DIET_STATES.length];
    saveWeek(data);
    render();
  }

  function cycleAlc(day) {
    const todayIdx = getTodayDayIndex();
    if (isCurrentWeek() && day > todayIdx) return;
    const data = loadWeek();
    if (!data.daily['alc']) data.daily['alc'] = {};
    const current = data.daily['alc'][day] || null;
    const idx = ALC_STATES.indexOf(current);
    data.daily['alc'][day] = ALC_STATES[(idx + 1) % ALC_STATES.length];
    saveWeek(data);
    render();
  }

  function cycleHip(day) {
    const todayIdx = getTodayDayIndex();
    if (isCurrentWeek() && day > todayIdx) return;
    const data = loadWeek();
    if (!data.daily['hip']) data.daily['hip'] = {};
    const current = data.daily['hip'][day] || null;
    const idx = HIP_STATES.indexOf(current);
    data.daily['hip'][day] = HIP_STATES[(idx + 1) % HIP_STATES.length];
    saveWeek(data);
    render();
  }

  function toggleWeekly(habit, idx) {
    const data = loadWeek();
    const current = data.weekly[habit] || 0;
    // clicking the nth box: if already filled up to idx+1, reduce; else set to idx+1
    data.weekly[habit] = current > idx ? idx : idx + 1;
    saveWeek(data);
    render();
  }

  function saveWeight() {
    const data = loadWeek();
    data.weight = document.getElementById('weightInput').value;
    saveWeek(data);
  }

  function saveNotes() {
    const data = loadWeek();
    data.notes = document.getElementById('notesInput').value;
    saveWeek(data);
  }

  function changeWeek(dir) {
    currentWeekOffset += dir;
    render();
  }

  render();
</script>
</body>
</html>
